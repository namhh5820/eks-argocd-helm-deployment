apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'oci://public.ecr.aws/karpenter/karpenter'
    targetRevision: v0.32.1
    chart: karpenter
    helm:
      values: |
        settings:
          clusterName: "eks-cluster-name"
          clusterEndpoint: "https://your-cluster-endpoint"
          interruptionQueueName: "eks-cluster-name"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
