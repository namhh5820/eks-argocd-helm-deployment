apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: python-app
  namespace: default
spec:
  interval: 5m
  install:
    createNamespace: true
  chart:
    spec:
      chart: k-helm-charts/python-app-chart
      sourceRef:
        kind: GitRepository
        name: main-repo
        namespace: flux-system
      interval: 1m
  values:
    replicaCount: 2
