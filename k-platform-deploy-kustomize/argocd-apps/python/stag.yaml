apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-app-kustomize-stag
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/<your-username>/eks-argocd-helm-deployment.git'
    targetRevision: HEAD
    path: k-platform-deploy-kustomize/python-app/overlays/stag
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: python-app-stag
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
